aid: axway
name: Axway
description: >-
  Axway provides API management, integration, and security solutions enabling
  organizations to connect, secure, and manage APIs across hybrid IT environments.
  Axway offers the Amplify platform for API management and a range of integration
  and security products for enterprises.
