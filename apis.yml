    url: https://github.com/Axway/api-builder-standalone-tech-enablement
- aid: axway:axway-amplify-streams
  name: Axway Amplify Streams
  description: >-
    Axway Amplify Streams provides a real-time event streaming API platform
    enabling publishers to push data updates to subscribers over
    Server-Sent Events (SSE) or WebSocket connections. It decouples
    producers from consumers for low-latency, event-driven API patterns
    across enterprise applications.
  humanURL: https://docs.axway.com/bundle/amplify-streams/
  baseURL: https://streams-open-docs.netlify.app
  tags:
  - Event-Driven
  - Real-Time
  - Streaming
  - WebSocket
  properties:
  - type: Documentation
    url: https://docs.axway.com/bundle/amplify-streams/
  - type: GettingStarted
    url:
      https://docs.axway.com/bundle/amplify-streams/page/docs/getting-started/index.html
- aid: axway:axway-amplify-engage
  name: Axway Amplify Engage
  description: >-
    Axway Amplify Engage is a centralized API marketplace solution that
    curates, packages, and monetizes APIs. It provides automated API
    discovery and threat detection, multi-gateway support via agent-based
    integration, API curation with categorization and versioning, and
    comprehensive observability dashboards tracking API adoption and usage.
  humanURL: https://www.axway.com/en/products/amplify-engage
  tags:
  - API Marketplace
  - API Monetization
  - Governance
  - Observability
  properties:
  - type: Documentation
    url: https://docs.axway.com/
- aid: axway:axway-amplify-ai-gateway
  name: Axway Amplify AI Gateway
  description: >-
    Axway Amplify AI Gateway is a secure, enterprise-grade AI gateway that
    governs AI integration, orchestrates intelligence, and accelerates
    innovation by integrating LLMs, vector databases, and chatbots into
    compliant workflows. It provides policy enforcement, role-based access
    control, token usage monitoring, prompt management, and MCP server
    support.
  humanURL: https://www.axway.com/en/products/amplify-ai-gateway
  tags:
  - AI
  - AI Gateway
  - Governance
  - LLM
  - MCP
  properties:
  - type: Documentation
    url: https://docs.axway.com/
- aid: axway:axway-amplify-fusion
  name: Axway Amplify Fusion
  description: >-
    Axway Amplify Fusion integrates applications, data, APIs, and AI
    systems into unified workflows across hybrid environments. It unifies
    APIs, file transfers, and B2B integrations with no-code and low-code
    interfaces, event-driven automation, and visual orchestration with
    out-of-the-box connectors and templates.
  humanURL: https://www.axway.com/en/products/amplify-fusion
  tags:
  - Automation
  - Integration
  - Low-Code
  - Workflow
  properties:
  - type: Documentation
    url: https://docs.axway.com/
- aid: axway:axway-flow-manager
  name: Axway Flow Manager
  description: >-
    Axway Flow Manager is a managed file transfer and B2B integration
    orchestration solution that automates business flows involving file
    exchange with trading partners. It provides visibility, governance,
    and SLA management for cross-enterprise data flows in industries such
    as retail, finance, and logistics.
  humanURL: https://docs.axway.com/bundle/FlowManager_20_allOS_en_HTML5/
  baseURL: https://docs.axway.com
  tags:
  - B2B Integration
  - Enterprise
  - File Transfer
  - MFT
  properties:
  - type: Documentation
    url: https://docs.axway.com/bundle/FlowManager_20_allOS_en_HTML5/
- aid: axway:axway-securetransport
  name: Axway SecureTransport
  description: >-
    Axway SecureTransport is a managed file transfer gateway for receiving
    and exchanging business data securely. It supports high-volume,
    mission-critical file transfers across cloud, on-premises, and hybrid
    environments with compliance and audit capabilities.
  humanURL: https://www.axway.com/en/products/managed-file-transfer
  tags:
  - Compliance
  - Enterprise
  - File Transfer
  - MFT
  properties:
  - type: Documentation
    url: https://docs.axway.com/
  - type: CodeExamples
    url: https://github.com/Axway/ST_API_Examples
    title: SecureTransport REST API Examples
- aid: axway:axway-transfer-cft
  name: Axway Transfer CFT
  description: >-
    Axway Transfer CFT enables decentralized file transfers across cloud,
    on-premises, and data pipelines. It provides reliable, automated file
    exchange for enterprise integration scenarios requiring distributed
    transfer agents.
  humanURL: https://www.axway.com/en/products/managed-file-transfer
  tags:
  - Decentralized
  - Enterprise
  - File Transfer
  - MFT
  properties:
  - type: Documentation
    url: https://docs.axway.com/
- aid: axway:axway-b2bi
  name: Axway B2Bi
  description: >-
    Axway B2Bi is a B2B and EDI integration solution for automating partner
    data exchange. It supports EDI, AS2, and other B2B protocols for
    trading partner onboarding, document transformation, and compliance
    with industry standards.
  humanURL: https://www.axway.com/en/products/b2b-integration
  tags:
  - B2B
  - EDI
  - Integration
  - Trading Partners
  properties:
  - type: Documentation
    url: https://docs.axway.com/
- aid: axway:axway-open-banking
  name: Axway Open Banking
  description: >-
    Axway Open Banking provides prebuilt APIs for regulatory compliance and
    ecosystem engagement, supporting PSD2 and open banking standards. It
    enables financial institutions to expose and manage banking APIs
    securely.
  humanURL: https://www.axway.com/en/products/amplify-open-banking
  tags:
  - Banking
  - Compliance
  - Finance
  - Open Banking
  - PSD2
  properties:
  - type: Documentation
    url: https://docs.axway.com/
