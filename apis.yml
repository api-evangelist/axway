aid: axway
name: Axway
description: >-
  Axway provides API management, integration, and security solutions enabling
  organizations to connect, secure, and manage APIs across hybrid IT environments.
  Axway offers the Amplify platform for API management and a range of integration
  and security products for enterprises.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - API Management
  - Enterprise
  - Integration
  - Security
url: https://raw.githubusercontent.com/api-evangelist/axway/refs/heads/main/apis.yml
created: '2026-03-16'
modified: '2026-03-18'
specificationVersion: '0.19'
apis:
  - aid: axway:axway-amplify-api
    name: Axway Amplify Platform API
    description: >-
      The Axway Amplify Platform provides APIs for managing API products,
      environments, and consumer subscriptions across the enterprise API
      management platform.
    humanURL: https://docs.axway.com/
    tags:
      - Amplify
      - API Management
      - Enterprise
    properties:
      - type: Documentation
        url: https://docs.axway.com/
  - aid: axway:axway-amplify-central-api
    name: Axway Amplify Central API
    description: >-
      Axway Amplify Central is the unified API management hub that enables
      discovery, consumption, and governance of APIs across the enterprise.
      It provides a central catalog for registering APIs from any gateway and
      managing the full API lifecycle including publishing, subscriptions, and
      access control.
    humanURL: https://docs.axway.com/bundle/amplify-central/
    baseURL: https://apicentral.axway.com
    tags:
      - Amplify
      - API Catalog
      - API Management
      - Governance
    properties:
      - type: Documentation
        url: https://docs.axway.com/bundle/amplify-central/
      - type: Getting Started
        url: https://docs.axway.com/bundle/amplify-central/page/docs/getting_started_with_amplify_central/index.html
      - type: Reference
        url: https://docs.axway.com/bundle/amplify-central/page/docs/integrate_with_central/index.html
      - type: Authentication
        url: https://docs.axway.com/bundle/amplify-central/page/docs/integrate_with_central/cli_central/cli_install/index.html
  - aid: axway:axway-api-gateway
    name: Axway API Gateway
    description: >-
      Axway API Gateway is an enterprise-grade API gateway providing security,
      mediation, and traffic management for APIs deployed on-premises or in
      hybrid environments. It supports policy-based security, OAuth, and
      integration with backend services for high-performance API delivery.
    humanURL: https://docs.axway.com/bundle/axway-open-docs/
    baseURL: https://docs.axway.com
    tags:
      - API Gateway
      - Enterprise
      - On-Premises
      - Security
    properties:
      - type: Documentation
        url: https://docs.axway.com/bundle/axway-open-docs/
      - type: Getting Started
        url: https://docs.axway.com/bundle/axway-open-docs/page/docs/apigw_getstarted/index.html
      - type: Change Log
        url: https://docs.axway.com/bundle/axway-open-docs/page/docs/apigw_releasenotes/index.html
  - aid: axway:axway-api-manager
    name: Axway API Manager
    description: >-
      Axway API Manager is a web-based management interface layered on top of
      API Gateway that enables organizations to register, virtualize, secure,
      and publish APIs to internal and external consumers. It provides
      lifecycle management, consumer self-service, and usage analytics for
      the full API catalog.
    humanURL: https://docs.axway.com/bundle/axway-open-docs/page/docs/apim_administration/apimgr_admin/index.html
    baseURL: https://docs.axway.com
    tags:
      - Administration
      - API Lifecycle
      - API Management
      - Enterprise
    properties:
      - type: Documentation
        url: https://docs.axway.com/bundle/axway-open-docs/page/docs/apim_administration/apimgr_admin/index.html
      - type: Reference
        url: https://docs.axway.com/bundle/axway-open-docs/page/docs/apim_reference/index.html
  - aid: axway:axway-api-builder
    name: Axway API Builder
    description: >-
      Axway API Builder is a low-code tool for building and deploying
      microservices and APIs from data sources and business logic. It provides
      a visual flow editor to compose API endpoints, connect to databases,
      and integrate with third-party services as containerized Node.js
      microservices.
    humanURL: https://docs.axway.com/bundle/api-builder/
    baseURL: https://docs.axway.com
    tags:
      - API Builder
      - Low-Code
      - Microservices
      - Node.js
    properties:
      - type: Documentation
        url: https://docs.axway.com/bundle/api-builder/
      - type: Getting Started
        url: https://docs.axway.com/bundle/api-builder/page/docs/getting_started/index.html
      - type: Change Log
        url: https://docs.axway.com/bundle/api-builder/page/docs/release_notes/index.html
      - type: GitHubRepository
        url: https://github.com/Axway/api-builder-standalone-tech-enablement
  - aid: axway:axway-amplify-streams
    name: Axway Amplify Streams
    description: >-
      Axway Amplify Streams provides a real-time event streaming API platform
      enabling publishers to push data updates to subscribers over
      Server-Sent Events (SSE) or WebSocket connections. It decouples
      producers from consumers for low-latency, event-driven API patterns
      across enterprise applications.
    humanURL: https://docs.axway.com/bundle/amplify-streams/
    baseURL: https://streams-open-docs.netlify.app
    tags:
      - Event-Driven
      - Real-Time
      - Streaming
      - WebSocket
    properties:
      - type: Documentation
        url: https://docs.axway.com/bundle/amplify-streams/
      - type: Getting Started
        url: https://docs.axway.com/bundle/amplify-streams/page/docs/getting-started/index.html
  - aid: axway:axway-flow-manager
    name: Axway Flow Manager
    description: >-
      Axway Flow Manager is a managed file transfer and B2B integration
      orchestration solution that automates business flows involving file
      exchange with trading partners. It provides visibility, governance,
      and SLA management for cross-enterprise data flows in industries such
      as retail, finance, and logistics.
    humanURL: https://docs.axway.com/bundle/FlowManager_20_allOS_en_HTML5/
    baseURL: https://docs.axway.com
    tags:
      - B2B Integration
      - Enterprise
      - File Transfer
      - MFT
    properties:
      - type: Documentation
        url: https://docs.axway.com/bundle/FlowManager_20_allOS_en_HTML5/
