- type: Features
  data:
  - name: API Lifecycle Management
    description: Manage the full API lifecycle from design, development,
      publishing to retirement.
  - name: API Gateway
    description: Enterprise-grade API gateway with over 200 prebuilt security
      policies, OAuth, and traffic management.
  - name: Unified API Catalog
    description: Centralized catalog for discovering and consuming APIs from any
      gateway.
  - name: Event Streaming
    description: Real-time event streaming with SSE and WebSocket for
      event-driven API patterns.
  - name: Managed File Transfer
    description: Automate B2B file exchange with trading partners with SLA
      governance.
  - name: Low-Code API Building
    description: Build and deploy microservices visually with Axway API Builder
      flow editor.
  - name: Consumer Self-Service
    description: Enable API consumers to discover, subscribe, and manage API
      access independently.
  - name: Hybrid Deployment
    description: Deploy across on-premises, cloud, and hybrid environments with
      a unified control plane.
  - name: AI Gateway
    description: Secure and govern AI integration with LLM orchestration, prompt
      management, and MCP server support.
  - name: API Marketplace
    description: Curate, package, and monetize APIs with automated discovery and
      multi-gateway support.
  - name: Federated Governance
    description: Enforce standardization and compliance across distributed API
      gateways and environments.
  - name: No-Code Integration
    description: Visual orchestration with out-of-the-box connectors and templates
      for business users.
- type: UseCases
  data:
  - name: Enterprise API Management
    description: Govern and manage APIs across distributed enterprise teams and
      environments.
  - name: B2B Integration
    description: Automate partner data exchange with secure MFT and EDI
      workflows.
  - name: API Monetization
    description: Publish APIs to a marketplace with tiered subscription plans
      and usage billing.
  - name: Real-Time Data Streaming
    description: Deliver live data updates to clients using event streaming
      APIs.
  - name: Open Banking
    description: Implement open banking APIs compliant with PSD2 and regulatory
      requirements.
  - name: AI Integration
    description: Securely integrate LLMs and AI models into enterprise workflows
      with policy-based governance.
  - name: Managed File Transfer
    description: Exchange mission-critical files across cloud and on-premises
      environments with compliance and audit trails.
  - name: Supply Chain Integration
    description: Connect trading partners with EDI, eInvoicing, and track-and-trace
      capabilities.
- type: Integrations
  data:
  - name: AWS
    description: Deploy Amplify Central and API Gateway on AWS infrastructure.
  - name: Azure
    description: Connect and manage Azure API Management services via Amplify
      Central.
  - name: MuleSoft Anypoint
    description: Discover and govern MuleSoft APIs from Amplify Central.
  - name: ServiceNow
    description: Integrate API incidents and change management with ServiceNow
      workflows.
  - name: Splunk
    description: Stream API analytics and security events to Splunk for SIEM
      analysis.
  - name: OpenAI
    description: Route and govern OpenAI LLM traffic through the Amplify AI Gateway.
  - name: SAP
    description: Integrate SAP systems and data via Amplify Fusion connectors.
- type: Solutions
  data:
  - name: Financial Services
    description: Open banking, PSD2 compliance, and secure API-driven banking
      ecosystems.
  - name: Healthcare
    description: Secure data exchange and API governance for healthcare providers
      and payers.
  - name: Retail And Supply Chain
    description: B2B integration, EDI, and trading partner automation for retail
      and logistics.
  - name: Government
    description: Secure file transfer and API management for government agencies
      and compliance.
