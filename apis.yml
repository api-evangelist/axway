- aid: axway:axway-api-gateway
  name: Axway API Gateway
  description: >-
    Axway API Gateway is an enterprise-grade API gateway providing security,
    mediation, and traffic management for APIs deployed on-premises or in
    hybrid environments. It supports policy-based security with over 200
    prebuilt security policies, OAuth, and integration with backend services
    for high-performance API delivery.
  humanURL: https://docs.axway.com/bundle/axway-open-docs/
  baseURL: https://docs.axway.com
  tags:
  - API Gateway
  - Enterprise
  - On-Premises
  - Security
  properties:
  - type: Documentation
    url: https://docs.axway.com/bundle/axway-open-docs/
  - type: GettingStarted
