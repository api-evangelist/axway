- aid: axway:axway-api-builder
  name: Axway API Builder
  description: >-
    Axway API Builder is a low-code tool for building and deploying
    microservices and APIs from data sources and business logic. It provides
    a visual flow editor to compose API endpoints, connect to databases,
    and integrate with third-party services as containerized Node.js
    microservices.
  humanURL: https://docs.axway.com/bundle/api-builder/
  baseURL: https://docs.axway.com
  tags:
  - API Builder
  - Low-Code
  - Microservices
  - Node.js
  properties:
