specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Axway
providerId: axway
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Management
  - Enterprise
  - Integration
  - Security
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Axway: subscription / quote-based licensing for enterprise API
  management, integration, and MFT software. Costs are negotiated rather than usage-metered at the provider
  level.'
notes: Axway pricing is contact-sales only; FinOps shape derived from product portfolio rather than published
  rate cards.
sources:
  - https://www.axway.com/en/axway-pricing
  - https://www.axway.com/en/products
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Axway Software SA
serviceCategory: Developer Tools / API
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Axway
  ServiceCategory: Developer Tools / API
  ProviderName: Axway
  PublisherName: Axway Software SA
  InvoiceIssuerName: Axway Software SA
  PricingCategory: Subscription
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: subscription_seats
    description: Per-seat or named-user licenses where applicable
    unit: seat
    aggregation: max
    dimensions:
      - product
      - environment
  - name: api_transactions
    description: API gateway transactions billed under Amplify-hosted SKUs
    unit: transaction
    aggregation: sum
    dimensions:
      - product
      - environment
      - region
  - name: managed_environments
    description: Number of managed deployments (dev/test/staging/prod)
    unit: environment
    aggregation: max
    dimensions:
      - product
      - region
  - name: mft_volume
    description: File transfer volume for SecureTransport / Transfer CFT
    unit: GB
    aggregation: sum
    dimensions:
      - product
principles:
  - name: Visibility
    description: Track Axway entitlements and consumption through Amplify Platform Reporting and license
      management dashboards; export to internal cost systems.
  - name: Allocation
    description: Tag environments and APIs with team / business-unit metadata in Amplify Central to allocate
      subscription cost across consumers.
  - name: Optimization
    description: Right-size environments at renewal; consolidate gateways, retire unused APIs, and negotiate
      multi-year terms for volume discount.
  - name: Accountability
    description: Assign API product owners in Amplify Engage; review utilization against contracted volumes
      quarterly to avoid over-provisioning.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
