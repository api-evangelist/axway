naftiko: 1.0.0-alpha2
info:
  label: Amplify Platform API v1.0.0 — role
  description: 'Amplify Platform API v1.0.0 — role. 2 operations. Lead operation: Axway Get Roles Matching Query. Self-contained
    Naftiko capability covering one Axway business surface.'
  tags:
  - Axway
  - role
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AXWAY_API_KEY: AXWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: amplify-platform-role
    baseUri: https://platform.axway.com/api/v1
    description: Amplify Platform API v1.0.0 — role business capability. Self-contained, no shared references.
    resources:
    - name: role
      path: /role
      operations:
      - name: rolefind
        method: GET
        description: Axway Get Roles Matching Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: default
          in: query
          type: boolean
        - name: name
          in: query
          type: string
        - name: org
          in: query
          type: boolean
        - name: team
          in: query
          type: boolean
    - name: role-role_id
      path: /role/{role_id}
      operations:
      - name: rolefindone
        method: GET
        description: Axway Get Role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: role_id
          in: path
          type: string
          required: true
        - name: context
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.AXWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: amplify-platform-role-rest
    port: 8080
    description: REST adapter for Amplify Platform API v1.0.0 — role. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/role
      name: role
      description: REST surface for role.
      operations:
      - method: GET
        name: rolefind
        description: Axway Get Roles Matching Query
        call: amplify-platform-role.rolefind
        with:
          default: rest.default
          name: rest.name
          org: rest.org
          team: rest.team
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/role/{role-id}
      name: role-role-id
      description: REST surface for role-role_id.
      operations:
      - method: GET
        name: rolefindone
        description: Axway Get Role
        call: amplify-platform-role.rolefindone
        with:
          role_id: rest.role_id
          context: rest.context
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amplify-platform-role-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amplify Platform API v1.0.0 — role. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: axway-get-roles-matching-query
      description: Axway Get Roles Matching Query
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-role.rolefind
      with:
        default: tools.default
        name: tools.name
        org: tools.org
        team: tools.team
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-get-role
      description: Axway Get Role
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-role.rolefindone
      with:
        role_id: tools.role_id
        context: tools.context
      outputParameters:
      - type: object
        mapping: $.
