naftiko: 1.0.0-alpha2
info:
  label: Amplify Platform API v1.0.0 — session
  description: 'Amplify Platform API v1.0.0 — session. 3 operations. Lead operation: Axway Get Session. Self-contained Naftiko
    capability covering one Axway business surface.'
  tags:
  - Axway
  - session
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AXWAY_API_KEY: AXWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: amplify-platform-session
    baseUri: https://platform.axway.com/api/v1
    description: Amplify Platform API v1.0.0 — session business capability. Self-contained, no shared references.
    resources:
    - name: session
      path: /session
      operations:
      - name: sessionfind
        method: GET
        description: Axway Get Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: session-query
      path: /session/query
      operations:
      - name: sessionquery
        method: POST
        description: Axway Find Sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: page
          in: query
          type: number
        - name: skip
          in: query
          type: number
        - name: sort
          in: query
          type: array
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: session-session_id
      path: /session/{session_id}
      operations:
      - name: sessionremove
        method: DELETE
        description: Axway Delete Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: session_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AXWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: amplify-platform-session-rest
    port: 8080
    description: REST adapter for Amplify Platform API v1.0.0 — session. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/session
      name: session
      description: REST surface for session.
      operations:
      - method: GET
        name: sessionfind
        description: Axway Get Session
        call: amplify-platform-session.sessionfind
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/session/query
      name: session-query
      description: REST surface for session-query.
      operations:
      - method: POST
        name: sessionquery
        description: Axway Find Sessions
        call: amplify-platform-session.sessionquery
        with:
          limit: rest.limit
          page: rest.page
          skip: rest.skip
          sort: rest.sort
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/session/{session-id}
      name: session-session-id
      description: REST surface for session-session_id.
      operations:
      - method: DELETE
        name: sessionremove
        description: Axway Delete Session
        call: amplify-platform-session.sessionremove
        with:
          session_id: rest.session_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amplify-platform-session-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amplify Platform API v1.0.0 — session. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: axway-get-session
      description: Axway Get Session
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-session.sessionfind
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-find-sessions
      description: Axway Find Sessions
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: amplify-platform-session.sessionquery
      with:
        limit: tools.limit
        page: tools.page
        skip: tools.skip
        sort: tools.sort
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-delete-session
      description: Axway Delete Session
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: amplify-platform-session.sessionremove
      with:
        session_id: tools.session_id
      outputParameters:
      - type: object
        mapping: $.
