        call: amplify-platform.export-create
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: export-findAll
        description: Axway Find Exports
        call: amplify-platform.export-findAll
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: export-download
        description: Axway Retrieve a Download Url
        call: amplify-platform.export-download
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: export-remove
        description: Axway Remove Export
        call: amplify-platform.export-remove
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/telemetry
      name: telemetry
      description: Telemetry operations
      operations:
      - method: POST
        name: analytics-create
        description: Axway Send Events
        call: amplify-platform.analytics-create
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/aca
      name: aca
      description: Aca operations
      operations:
      - method: PUT
        name: aca-setMetadata
        description: Axway Set Metadata by ID
        call: amplify-platform.aca-setMetadata
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: aca-findOne
        description: Axway Find Crash Record by ID
        call: amplify-platform.aca-findOne
        outputParameters:
        - type: object
          mapping: $.
