naftiko: 1.0.0-alpha1
info:
  label: Axway Application and Analytics
  description: Manage applications, clients, monitor analytics, usage, activity, and data exports on the Axway Amplify platform.
  tags:
  - Axway
  - Applications
  - Analytics
  - Monitoring
  created: '2026-04-21'
  modified: '2026-04-21'
binds:
- namespace: env
  keys:
    AXWAY_BEARER_TOKEN: AXWAY_BEARER_TOKEN
capability:
  consumes:
  - import: amplify-platform
    location: ./shared/amplify-platform.yaml
  exposes:
  - type: rest
    port: 8082
    namespace: application-and-analytics-api
    description: Unified REST API for manage applications, clients, monitor analytics, usage, activity, and data exports on the axway amplify platform.
    resources:
    - path: /v1/app
      name: app
      description: App operations
      operations:
      - method: POST
        name: app-create
        description: Axway Create App
        call: amplify-platform.app-create
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: app-find
        description: Axway Find Apps
        call: amplify-platform.app-find
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: app-findOne
        description: Axway Find App
        call: amplify-platform.app-findOne
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: app-remove
        description: Axway Remove App
        call: amplify-platform.app-remove
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: app-update
        description: Axway Update App
        call: amplify-platform.app-update
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/client
      name: client
      description: Client operations
      operations:
      - method: POST
        name: client-create
        description: Axway Add Service Account
        call: amplify-platform.client-create
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: client-find
        description: Axway Get Service Accounts
        call: amplify-platform.client-find
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: client-download
        description: Axway Get Service Account JSON Representation
        call: amplify-platform.client-download
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: client-findOne
        description: Axway Get a Service Account
        call: amplify-platform.client-findOne
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: client-remove
        description: Axway Delete Service Account
        call: amplify-platform.client-remove
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: client-update
        description: Axway Update Service Account
        call: amplify-platform.client-update
        outputParameters:
        - type: object
          mapping: $.
