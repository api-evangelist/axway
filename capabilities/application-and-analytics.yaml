        name: usage-uploadAutomatic
        description: Axway Uploads an Automatic Usage Report
        call: amplify-platform.usage-uploadAutomatic
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: usage-find
        description: Axway Fetches Usage Reports
        call: amplify-platform.usage-find
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: usage-upload
        description: Axway Uploads a Usage Report
        call: amplify-platform.usage-upload
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: usage-download
        description: Axway Downloads a Usage Report
        call: amplify-platform.usage-download
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: org-findUsage
