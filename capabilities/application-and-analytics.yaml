        - type: object
          mapping: $.
      - method: GET
        name: analytics-customFind
        description: Axway Find Custom Queries
        call: amplify-platform.analytics-customFind
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: analytics-customRemove
        description: Axway Delete a Custom Query
        call: amplify-platform.analytics-customRemove
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: analytics-customUpdate
        description: Axway Update a Custom Query
        call: amplify-platform.analytics-customUpdate
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: analytics-customFindOne
        description: Axway Get Custom Query
        call: amplify-platform.analytics-customFindOne
        outputParameters:
        - type: object
          mapping: $.
