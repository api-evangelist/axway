naftiko: 1.0.0-alpha2
info:
  label: Amplify Platform API v1.0.0 — export
  description: 'Amplify Platform API v1.0.0 — export. 4 operations. Lead operation: Axway Export Data. Self-contained Naftiko
    capability covering one Axway business surface.'
  tags:
  - Axway
  - export
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AXWAY_API_KEY: AXWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: amplify-platform-export
    baseUri: https://platform.axway.com/api/v1
    description: Amplify Platform API v1.0.0 — export business capability. Self-contained, no shared references.
    resources:
    - name: export
      path: /export
      operations:
      - name: exportcreate
        method: POST
        description: Axway Export Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: exportfindall
        method: GET
        description: Axway Find Exports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: query
          type: string
    - name: export-download-export_id
      path: /export/download/{export_id}
      operations:
      - name: exportdownload
        method: GET
        description: Axway Retrieve a Download Url
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: export_id
          in: path
          type: string
          required: true
    - name: export-export_id
      path: /export/{export_id}
      operations:
      - name: exportremove
        method: DELETE
        description: Axway Remove Export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: export_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AXWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: amplify-platform-export-rest
    port: 8080
    description: REST adapter for Amplify Platform API v1.0.0 — export. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/export
      name: export
      description: REST surface for export.
      operations:
      - method: POST
        name: exportcreate
        description: Axway Export Data
        call: amplify-platform-export.exportcreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: exportfindall
        description: Axway Find Exports
        call: amplify-platform-export.exportfindall
        with:
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/export/download/{export-id}
      name: export-download-export-id
      description: REST surface for export-download-export_id.
      operations:
      - method: GET
        name: exportdownload
        description: Axway Retrieve a Download Url
        call: amplify-platform-export.exportdownload
        with:
          export_id: rest.export_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/export/{export-id}
      name: export-export-id
      description: REST surface for export-export_id.
      operations:
      - method: DELETE
        name: exportremove
        description: Axway Remove Export
        call: amplify-platform-export.exportremove
        with:
          export_id: rest.export_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amplify-platform-export-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amplify Platform API v1.0.0 — export. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: axway-export-data
      description: Axway Export Data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amplify-platform-export.exportcreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-find-exports
      description: Axway Find Exports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-export.exportfindall
      with:
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-retrieve-download-url
      description: Axway Retrieve a Download Url
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-export.exportdownload
      with:
        export_id: tools.export_id
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-remove-export
      description: Axway Remove Export
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: amplify-platform-export.exportremove
      with:
        export_id: tools.export_id
      outputParameters:
      - type: object
        mapping: $.
