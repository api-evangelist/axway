          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          required: true
        - name: provider_guid
          in: query
          type: string
        - name: authorization
          in: header
          type: string
        - name: x-auth-token
          in: header
          type: string
      - name: userremove
        method: DELETE
        description: Axway Remove User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
