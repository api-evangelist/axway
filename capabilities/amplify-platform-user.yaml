        description: Axway Set Credentials for Tooling
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: user-domain-domain
      path: /user/domain/{domain}
      operations:
      - name: userfinddomain
        method: GET
        description: Axway Find Missing Domain Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
        - name: org_id
          in: query
          type: number
    - name: user-organizations
      path: /user/organizations
