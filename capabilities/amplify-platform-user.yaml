          in: path
          type: string
          required: true
        - name: suppressEmail
          in: query
          type: boolean
        - name: x-auth-token
          in: header
          type: string
        - name: x-auth-password
          in: header
          type: string
        - name: x-auth-code
          in: header
          type: string
