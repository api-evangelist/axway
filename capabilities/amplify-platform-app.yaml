naftiko: 1.0.0-alpha2
info:
  label: Amplify Platform API v1.0.0 — app
  description: 'Amplify Platform API v1.0.0 — app. 5 operations. Lead operation: Axway Create App. Self-contained Naftiko
    capability covering one Axway business surface.'
  tags:
  - Axway
  - app
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AXWAY_API_KEY: AXWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: amplify-platform-app
    baseUri: https://platform.axway.com/api/v1
    description: Amplify Platform API v1.0.0 — app business capability. Self-contained, no shared references.
    resources:
    - name: app
      path: /app
      operations:
      - name: appcreate
        method: POST
        description: Axway Create App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: appfind
        method: GET
        description: Axway Find Apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A list of fields to include in the response.
        - name: org_id
          in: query
          type: integer
        - name: provider_guid
          in: query
          type: string
        - name: subtype
          in: query
          type: string
        - name: type
          in: query
          type: string
    - name: app-app_id
      path: /app/{app_id}
      operations:
      - name: appfindone
        method: GET
        description: Axway Find App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: app_id
          in: path
          type: string
          required: true
        - name: org_id
          in: query
          type: integer
      - name: appremove
        method: DELETE
        description: Axway Remove App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: app_id
          in: path
          type: string
          required: true
      - name: appupdate
        method: PUT
        description: Axway Update App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: app_id
          in: path
          type: string
          required: true
        - name: org_id
          in: query
          type: integer
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.AXWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: amplify-platform-app-rest
    port: 8080
    description: REST adapter for Amplify Platform API v1.0.0 — app. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/app
      name: app
      description: REST surface for app.
      operations:
      - method: POST
        name: appcreate
        description: Axway Create App
        call: amplify-platform-app.appcreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: appfind
        description: Axway Find Apps
        call: amplify-platform-app.appfind
        with:
          fields: rest.fields
          org_id: rest.org_id
          provider_guid: rest.provider_guid
          subtype: rest.subtype
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/{app-id}
      name: app-app-id
      description: REST surface for app-app_id.
      operations:
      - method: GET
        name: appfindone
        description: Axway Find App
        call: amplify-platform-app.appfindone
        with:
          app_id: rest.app_id
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: appremove
        description: Axway Remove App
        call: amplify-platform-app.appremove
        with:
          app_id: rest.app_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: appupdate
        description: Axway Update App
        call: amplify-platform-app.appupdate
        with:
          app_id: rest.app_id
          org_id: rest.org_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amplify-platform-app-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amplify Platform API v1.0.0 — app. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: axway-create-app
      description: Axway Create App
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amplify-platform-app.appcreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-find-apps
      description: Axway Find Apps
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-app.appfind
      with:
        fields: tools.fields
        org_id: tools.org_id
        provider_guid: tools.provider_guid
        subtype: tools.subtype
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-find-app
      description: Axway Find App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-app.appfindone
      with:
        app_id: tools.app_id
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-remove-app
      description: Axway Remove App
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: amplify-platform-app.appremove
      with:
        app_id: tools.app_id
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-update-app
      description: Axway Update App
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: amplify-platform-app.appupdate
      with:
        app_id: tools.app_id
        org_id: tools.org_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
