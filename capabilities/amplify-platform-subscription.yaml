naftiko: 1.0.0-alpha2
info:
  label: Amplify Platform API v1.0.0 — subscription
  description: 'Amplify Platform API v1.0.0 — subscription. 2 operations. Lead operation: Axway Find Subscriptions. Self-contained
    Naftiko capability covering one Axway business surface.'
  tags:
  - Axway
  - subscription
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AXWAY_API_KEY: AXWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: amplify-platform-subscription
    baseUri: https://platform.axway.com/api/v1
    description: Amplify Platform API v1.0.0 — subscription business capability. Self-contained, no shared references.
    resources:
    - name: org-org_id-subscription
      path: /org/{org_id}/subscription
      operations:
      - name: orgfindsubscriptions
        method: GET
        description: Axway Find Subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: x-auth-token
          in: header
          type: string
    - name: org-org_id-subscription-subscription_id
      path: /org/{org_id}/subscription/{subscription_id}
      operations:
      - name: orgfindonesubscription
        method: GET
        description: Axway Find Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: subscription_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AXWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: amplify-platform-subscription-rest
    port: 8080
    description: REST adapter for Amplify Platform API v1.0.0 — subscription. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/org/{org-id}/subscription
      name: org-org-id-subscription
      description: REST surface for org-org_id-subscription.
      operations:
      - method: GET
        name: orgfindsubscriptions
        description: Axway Find Subscriptions
        call: amplify-platform-subscription.orgfindsubscriptions
        with:
          org_id: rest.org_id
          x-auth-token: rest.x-auth-token
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/org/{org-id}/subscription/{subscription-id}
      name: org-org-id-subscription-subscription-id
      description: REST surface for org-org_id-subscription-subscription_id.
      operations:
      - method: GET
        name: orgfindonesubscription
        description: Axway Find Subscription
        call: amplify-platform-subscription.orgfindonesubscription
        with:
          org_id: rest.org_id
          subscription_id: rest.subscription_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amplify-platform-subscription-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amplify Platform API v1.0.0 — subscription. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: axway-find-subscriptions
      description: Axway Find Subscriptions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-subscription.orgfindsubscriptions
      with:
        org_id: tools.org_id
        x-auth-token: tools.x-auth-token
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-find-subscription
      description: Axway Find Subscription
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-subscription.orgfindonesubscription
      with:
        org_id: tools.org_id
        subscription_id: tools.subscription_id
      outputParameters:
      - type: object
        mapping: $.
