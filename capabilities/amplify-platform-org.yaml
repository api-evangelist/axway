naftiko: 1.0.0-alpha2
info:
  label: Amplify Platform API v1.0.0 — org
  description: 'Amplify Platform API v1.0.0 — org. 11 operations. Lead operation: Axway Find Organization Environments. Self-contained
    Naftiko capability covering one Axway business surface.'
  tags:
  - Axway
  - org
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AXWAY_API_KEY: AXWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: amplify-platform-org
    baseUri: https://platform.axway.com/api/v1
    description: Amplify Platform API v1.0.0 — org business capability. Self-contained, no shared references.
    resources:
    - name: org-env
      path: /org/env
      operations:
      - name: orgfindenvs
        method: GET
        description: Axway Find Organization Environments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: query
          type: string
        - name: target
          in: query
          type: string
    - name: org-org_id
      path: /org/{org_id}
      operations:
      - name: orgfindone
        method: GET
        description: Axway Get Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: exclude_fields
          in: query
          type: array
          description: A list of fields to exclude from the response.
        - name: org_id
          in: path
          type: string
          required: true
        - name: onboarding
          in: query
          type: boolean
        - name: authorization
          in: header
          type: string
        - name: x-auth-token
          in: header
          type: string
      - name: orgremove
        method: DELETE
        description: Axway Delete Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: suppressEmail
          in: query
          type: boolean
        - name: x-auth-token
          in: header
          type: string
        - name: x-auth-code
          in: header
          type: string
      - name: orgupdate
        method: PUT
        description: Axway Update Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: authorization
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: org-org_id-stats
      path: /org/{org_id}/stats
      operations:
      - name: orgstats
        method: GET
        description: Axway Get Organization Stats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: env
          in: query
          type: string
        - name: from
          in: query
          type: integer
        - name: product
          in: query
          type: string
        - name: to
          in: query
          type: integer
    - name: org-org_id-user
      path: /org/{org_id}/user
      operations:
      - name: orgusercreate
        method: POST
        description: Axway Add User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: orguserfind
        method: GET
        description: Axway Get Members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A list of fields to include in the response.
        - name: org_id
          in: path
          type: string
          required: true
        - name: email
          in: query
          type: array
        - name: primary
          in: query
          type: string
        - name: roles
          in: query
          type: array
        - name: term
          in: query
          type: string
        - name: user_guid
          in: query
          type: array
        - name: limit
          in: query
          type: number
        - name: page
          in: query
          type: number
        - name: skip
          in: query
          type: number
        - name: sort
          in: query
          type: array
        - name: x-auth-token
          in: header
          type: string
    - name: org-org_id-user-user_guid
      path: /org/{org_id}/user/{user_guid}
      operations:
      - name: orguserfindone
        method: GET
        description: Axway Get Org User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: user_guid
          in: path
          type: string
          required: true
        - name: teams
          in: query
          type: boolean
        - name: x-auth-token
          in: header
          type: string
      - name: orguserremove
        method: DELETE
        description: Axway Remove User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: user_guid
          in: path
          type: string
          required: true
      - name: orguserupdate
        method: PUT
        description: Axway Update Org Member Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: user_guid
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: org-org_id-user-user_guid-primary
      path: /org/{org_id}/user/{user_guid}/primary
      operations:
      - name: orguserprimary
        method: PUT
        description: Axway Sets the Primary Contract for the Org
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: user_guid
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AXWAY_API_KEY}}'
