naftiko: 1.0.0-alpha2
info:
  label: Amplify Platform API v1.0.0 — activity
  description: 'Amplify Platform API v1.0.0 — activity. 2 operations. Lead operation: Axway Get Activity. Self-contained Naftiko
    capability covering one Axway business surface.'
  tags:
  - Axway
  - activity
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AXWAY_API_KEY: AXWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: amplify-platform-activity
    baseUri: https://platform.axway.com/api/v1
    description: Amplify Platform API v1.0.0 — activity business capability. Self-contained, no shared references.
    resources:
    - name: activity
      path: /activity
      operations:
      - name: activityfind
        method: GET
        description: Axway Get Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: app_guid
          in: query
          type: string
        - name: contexts
          in: query
          type: array
        - name: data
          in: query
          type: boolean
        - name: enrich
          in: query
          type: boolean
        - name: exclude_contexts
          in: query
          type: array
        - name: from
          in: query
          type: number
        - name: org_id
          in: query
          type: string
        - name: redact
          in: query
          type: boolean
        - name: sort
          in: query
          type: number
        - name: term
          in: query
          type: string
        - name: to
          in: query
          type: number
        - name: user_guid
          in: query
          type: string
        - name: user_messages
          in: query
          type: boolean
        - name: limit
          in: query
          type: number
        - name: page
          in: query
          type: number
        - name: skip
          in: query
          type: number
    - name: activity-event
      path: /activity/event
      operations:
      - name: activityfindevents
        method: GET
        description: Axway Get Activity Event Names
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: authorization
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.AXWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: amplify-platform-activity-rest
    port: 8080
    description: REST adapter for Amplify Platform API v1.0.0 — activity. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/activity
      name: activity
      description: REST surface for activity.
      operations:
      - method: GET
        name: activityfind
        description: Axway Get Activity
        call: amplify-platform-activity.activityfind
        with:
          app_guid: rest.app_guid
          contexts: rest.contexts
          data: rest.data
          enrich: rest.enrich
          exclude_contexts: rest.exclude_contexts
          from: rest.from
          org_id: rest.org_id
          redact: rest.redact
          sort: rest.sort
          term: rest.term
          to: rest.to
          user_guid: rest.user_guid
          user_messages: rest.user_messages
          limit: rest.limit
          page: rest.page
          skip: rest.skip
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/activity/event
      name: activity-event
      description: REST surface for activity-event.
      operations:
      - method: GET
        name: activityfindevents
        description: Axway Get Activity Event Names
        call: amplify-platform-activity.activityfindevents
        with:
          authorization: rest.authorization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amplify-platform-activity-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amplify Platform API v1.0.0 — activity. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: axway-get-activity
      description: Axway Get Activity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-activity.activityfind
      with:
        app_guid: tools.app_guid
        contexts: tools.contexts
        data: tools.data
        enrich: tools.enrich
        exclude_contexts: tools.exclude_contexts
        from: tools.from
        org_id: tools.org_id
        redact: tools.redact
        sort: tools.sort
        term: tools.term
        to: tools.to
        user_guid: tools.user_guid
        user_messages: tools.user_messages
        limit: tools.limit
        page: tools.page
        skip: tools.skip
      outputParameters:
      - type: object
        mapping: $.
    - name: axway-get-activity-event-names
      description: Axway Get Activity Event Names
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amplify-platform-activity.activityfindevents
      with:
        authorization: tools.authorization
      outputParameters:
      - type: object
        mapping: $.
