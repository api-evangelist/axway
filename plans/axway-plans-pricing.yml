    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for Axway. Includes dedicated capacity, contractual SLAs, security
      review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://platform.axway.com/api/v1
          - https://apicentral.axway.com
          - https://docs.axway.com
          - https://streams-open-docs.netlify.app
        unit: 1
        price: custom
        userMultiplied: false
