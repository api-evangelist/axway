specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Axway
providerId: axway
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - API Management
  - Enterprise
  - Integration
  - Security
description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: axway-free
    name: Free
    type: freemium
    description: Free entry tier for the Axway API surface. Intended for evaluation, prototyping, and
      low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://platform.axway.com/api/v1
          - https://apicentral.axway.com
          - https://docs.axway.com
          - https://streams-open-docs.netlify.app
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://platform.axway.com/api/v1
          - https://apicentral.axway.com
          - https://docs.axway.com
          - https://streams-open-docs.netlify.app
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: Axway Amplify Platform API
      - name: Axway Amplify Central API
      - name: Axway API Gateway
      - name: Axway API Manager
      - name: Axway API Builder
      - name: Axway Amplify Streams
      - name: Axway Amplify Engage
      - name: Axway Amplify AI Gateway
  - id: axway-pro
    name: Professional
    type: paid
    description: Production tier for Axway. Provides higher quotas, priority support, and access to the
      broader API portfolio. Pricing placeholder; align with the provider's pricing page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://platform.axway.com/api/v1
          - https://apicentral.axway.com
          - https://docs.axway.com
          - https://streams-open-docs.netlify.app
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://platform.axway.com/api/v1
          - https://apicentral.axway.com
          - https://docs.axway.com
          - https://streams-open-docs.netlify.app
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Overage
        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://platform.axway.com/api/v1
          - https://apicentral.axway.com
          - https://docs.axway.com
          - https://streams-open-docs.netlify.app
        unit: 1000
        price: TBD
        userMultiplied: false
    elements:
      - name: All Production Endpoints
      - name: Email Support
      - name: SLA Targets
      - name: Webhook Subscriptions
      - name: Axway Amplify Platform API
      - name: Axway Amplify Central API
      - name: Axway API Gateway
      - name: Axway API Manager
      - name: Axway API Builder
      - name: Axway Amplify Streams
