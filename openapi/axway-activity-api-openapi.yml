          enum:
          - administrator
          - developer
          - auditor
          - consumer
          example: administrator
        removed_roles:
          type: array
          description: Set of roles no longer assigned to the user.
          items:
            type: string
            enum:
            - administrator
            - developer
            - auditor
            - consumer
            - usage_reporter
            - api_central_admin
          example:
          - administrator
        role:
